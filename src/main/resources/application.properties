spring.application.name=tradeflow-api
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# JWT
app.jwt.secret=${JWT_SECRET:TradeflowApiSecretKeyForJwtSigningMustBeAtLeast256BitsLong}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.refresh-token.expiration-ms=${REFRESH_TOKEN_EXPIRATION_MS:604800000}

# OpenAPI / Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Redis (for phase-2 caching usage)
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# Redis cache + distributed rate limit
app.cache.default-ttl-seconds=${CACHE_TTL_SECONDS:300}
app.rate-limit.auth.max-requests=${AUTH_RATE_LIMIT_MAX_REQUESTS:25}
app.rate-limit.auth.window-seconds=${AUTH_RATE_LIMIT_WINDOW_SECONDS:60}

# Observability (Actuator + Prometheus + structured log context)
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.prometheus.metrics.export.enabled=true
management.metrics.tags.application=${spring.application.name}

logging.pattern.console=%d{yyyy-MM-dd'T'HH:mm:ss.SSSX} %-5level [%thread] [%logger{36}] [reqId=%X{requestId:-}] %msg%n

# RabbitMQ (async order execution)
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

app.rabbitmq.order-exchange=${ORDER_EXCHANGE:tradeflow.order.exchange}
app.rabbitmq.order-queue=${ORDER_QUEUE:tradeflow.order.execution.queue}
app.rabbitmq.order-routing-key=${ORDER_ROUTING_KEY:tradeflow.order.execute}
