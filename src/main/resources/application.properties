spring.application.name=tradeflow-api
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# JWT
app.jwt.secret=${JWT_SECRET:TradeflowApiSecretKeyForJwtSigningMustBeAtLeast256BitsLong}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.refresh-token.expiration-ms=${REFRESH_TOKEN_EXPIRATION_MS:604800000}

# OpenAPI / Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Redis (for phase-2 caching usage)
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
